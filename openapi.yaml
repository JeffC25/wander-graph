openapi: 3.1.0
info:
  title: WanderGraph API
  version: 0.1.0

servers:
  - url: http://localhost:8080

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email, nullable: true }
        displayName: { type: string }
        avatarUrl: { type: string, nullable: true }
        isGuest: { type: boolean }
        createdAt: { type: string, format: date-time }

    Trip:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        notes: { type: string, nullable: true }
        visibility: { type: string, enum: [private, public] }
        startDate: { type: string, format: date, nullable: true }
        endDate: { type: string, format: date, nullable: true }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    TripAccessRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        tripId: { type: string, format: uuid }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
        user: { $ref: "#/components/schemas/User" }

    TripMember:
      type: object
      properties:
        tripId: { type: string, format: uuid }
        role: { type: string, enum: [owner, editor, viewer] }
        joinedAt: { type: string, format: date-time }
        user: { $ref: "#/components/schemas/User" }

    CodeInvite:
      type: object
      properties:
        id: { type: string, format: uuid }
        tripId: { type: string, format: uuid }
        code: { type: string }
        createdBy: { type: string, format: uuid }
        maxUses: { type: integer, nullable: true }
        useCount: { type: integer }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time, nullable: true }

    DirectedInvite:
      type: object
      properties:
        id: { type: string, format: uuid }
        tripId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time, nullable: true }

    Destination:
      type: object
      properties:
        id: { type: string, format: uuid }
        tripId: { type: string, format: uuid }
        name: { type: string }
        notes: { type: string, nullable: true }
        lat: { type: number, nullable: true }
        long: { type: number, nullable: true }
        position: { type: integer }
        startsAt: { type: string, format: date-time, nullable: true }
        endsAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    ItineraryItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        destinationId: { type: string, format: uuid }
        title: { type: string }
        notes: { type: string, nullable: true }
        startsAt: { type: string, format: date-time, nullable: true }
        endsAt: { type: string, format: date-time, nullable: true }
        position: { type: integer }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    Leg:
      type: object
      properties:
        id: { type: string, format: uuid }
        tripId: { type: string, format: uuid }
        fromDestinationId: { type: string, format: uuid }
        toDestinationId: { type: string, format: uuid }
        name: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        distance: { type: number, nullable: true }
        cost: { type: number, nullable: true }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    OptimizeResult:
      type: object
      properties:
        orderedIds:
          type: array
          items: { type: string, format: uuid }
        skippedIds:
          type: array
          items: { type: string, format: uuid }
        suggestedLegs:
          type: array
          items:
            type: object
            properties:
              fromDestinationIdId: { type: string, format: uuid }
              toDestinationId: { type: string, format: uuid }
              distance: { type: number }

    GeocodeResult:
      type: object
      properties:
        lat: { type: number }
        long: { type: number }
        name: { type: string }

    AuthTokens:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    Error:
      type: object
      properties:
        error: { type: string }

  responses:
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not authorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

paths:
  # Auth
  /auth/register:
    post:
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                displayName: { type: string }
                guestToken: { type: string }
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthTokens" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /auth/login:
    post:
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }

      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthTokens" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /auth/logout:
    post:
      tags: [auth]
      responses:
        "204": { description: Logged out }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /auth/refresh:
    post:
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthTokens" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /auth/guest:
    post:
      tags: [auth]
      security: []
      parameters:
        - in: query
          name: seed
          schema: { type: string, enum: [demo] }
      responses:
        "201":
          description: Guest session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthTokens" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # Users
  /users/me:
    get:
      tags: [users]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      tags: [users]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
                avatarUrl: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # Trips
  /trips:
    get:
      tags: [trips]
      responses:
        "200":
          description: List of trips for current user
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Trip" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      tags: [trips]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                notes: { type: string }
                visibility: { type: string, enum: [private, public] }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date }
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Trip" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [trips]
      responses:
        "200":
          description: Trip details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Trip" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      tags: [trips]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                notes: { type: string }
                visibility: { type: string, enum: [private, public] }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date }
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Trip" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [trips]
      responses:
        "204": { description: Trip deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/members:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [trips]
      responses:
        "200":
          description: List of trip members
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TripMember" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/members/{userID}:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: userID
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [trips]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [editor, viewer] }
      responses:
        "200":
          description: Updated member role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TripMember" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [trips]
      responses:
        "204": { description: Member removed }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/invites/code:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [trips]
      summary: List all code invites for a trip
      responses:
        "200":
          description: List of code invite
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CodeInvite" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      tags: [trips]
      summary: Create an open code invite
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                maxUses: { type: integer }
                expiresAt: { type: string, format: date-time }
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CodeInvite" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/invites/code/{inviteID}:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: inviteID
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [trips]
      responses:
        "204": { description: Code invite deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /invites/{code}/join:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    post:
      tags: [trips]
      summary: Join a trip via open invite code
      responses:
        "200":
          description: Joined trip
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TripMember" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/invites/direct:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [trips]
      summary: List all directed invites for a trip
      responses:
        "200":
          description: List of directed invite
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CodeInvite" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      tags: [trips]
      summary: Create a directed invite for a specific user by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                expiresAt: { type: string, format: date-time }
      responses:
        "201":
          description: Directed invited created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TripMember" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # Destinations
  /trips/{tripID}/destinations:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [destinations]
      responses:
        "200":
          description: List of destinations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Destination" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      tags: [destinations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                notes: { type: string }
                lat: { type: number }
                long: { type: number }
                startsAt: { type: string, format: date-time }
                endsAt: { type: string, format: date-time }
      responses:
        "201":
          description: Destination created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Destination" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/destinations/{destID}:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: destID
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [destinations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                notes: { type: string }
                lat: { type: number }
                long: { type: number }
                startsAt: { type: string, format: date-time }
                endsAt: { type: string, format: date-time }
      responses:
        "200":
          description: Updated destination
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Destination" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [destinations]
      responses:
        "204": { description: Destination deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/destinations/route:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [destinations]
      summary: Get current route in position order with per-leg costs
      responses:
        "200":
          description: Current route
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouteResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/destinations/route/optimize:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [destinations]
      summary: Get current route in position order with per-leg costs
      responses:
        "200":
          description: Current route
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouteResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  # Itinerary
  /trips/{tripID}/destinations/{destID}/items:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: destID
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [itinerary]
      responses:
        "200":
          description: List of itinerary items for destination
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ItineraryItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      tags: [itinerary]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                notes: { type: string }
                startsAt: { type: string, format: date-time }
                endsAt: { type: string, format: date-time }
      responses:
        "201":
          description: Itinerary item created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItineraryItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/destinations/{destID}/items/{itemID}:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: destID
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: itemID
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [itinerary]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                notes: { type: string }
                startsAt: { type: string, format: date-time }
                endsAt: { type: string, format: date-time }
      responses:
        "200":
          description: Updated itinerary item
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItineraryItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [itinerary]
      responses:
        "204": { description: Itinerary item deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /trips/{tripID}/destinations/{destID}/items/reorder:
    parameters:
      - in: path
        name: tripID
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: destID
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [itinerary]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [itemIDs]
              properties:
                itemIDs:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "204": { description: Items reordered }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  # Geocode
  /geocode/forward:
    post:
      tags: [geocode]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
      responses:
        "200":
          description: Geocode result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeocodeResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /geocode/reverse:
    post:
      tags: [geocode]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, long]
              properties:
                lat: { type: number }
                long: { type: number }
      responses:
        "200":
          description: Reverse geocode result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeocodeResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
